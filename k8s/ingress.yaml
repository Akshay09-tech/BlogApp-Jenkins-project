apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blog-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
      - path: /add
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000
      - path: /posts
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000
